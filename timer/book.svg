<svg class="book" viewBox="0 0 180 180"
     xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <!--
    PomoFomo — Book character "Page"

    Groups:
      book__root          body-level animations (bob, fly-out)
        book__closed      closed-book form: cover + spine + page-edge (idle)
        book__open        open-book form: two pages, spine, JS-driven elements
          book__page-left   left (read) page — CSS page-turn animation pivots right center
          book__page-right  right (unread) page — static
          book__spine       center spine strip
        #book__page-edge  right-edge page stack; JS: width 6→1, x = 156−width
        #book__bookmark   ribbon + V-notch; JS: transform="translate(dx,0)" dx 0→39
        book__zzz         floating ZZZ text — focus-sleeping state

      #book__shelf        OUTSIDE book__root so fly-out doesn't take the shelf
        shelf-book--1/2/3/4  session books; CSS hides 2-4, JS shows by sessionNumber
        book__sparkle     star above shelf
  -->

  <g class="book__root">

    <!-- ════════════════════════════════════════════════════════════
         CLOSED BOOK  (idle state)
         ════════════════════════════════════════════════════════════ -->
    <g class="book__closed">
      <!-- Drop shadow -->
      <ellipse cx="93" cy="152" rx="44" ry="5" fill="rgba(0,0,0,0.10)"/>
      <!-- Back cover (slightly offset for depth) -->
      <rect x="56" y="59" width="66" height="90" rx="5" fill="#9A3E14"/>
      <!-- Page stack visible on right edge -->
      <rect x="116" y="63" width="7" height="82" rx="2" fill="#F5EFDD"/>
      <!-- Page stack lines for realism -->
      <line x1="116" y1="70" x2="123" y2="70" stroke="#DDD0B5" stroke-width="0.8" opacity="0.6"/>
      <line x1="116" y1="78" x2="123" y2="78" stroke="#DDD0B5" stroke-width="0.8" opacity="0.5"/>
      <line x1="116" y1="86" x2="123" y2="86" stroke="#DDD0B5" stroke-width="0.8" opacity="0.5"/>
      <line x1="116" y1="94" x2="123" y2="94" stroke="#DDD0B5" stroke-width="0.8" opacity="0.4"/>
      <line x1="116" y1="102" x2="123" y2="102" stroke="#DDD0B5" stroke-width="0.8" opacity="0.4"/>
      <line x1="116" y1="110" x2="123" y2="110" stroke="#DDD0B5" stroke-width="0.8" opacity="0.4"/>
      <line x1="116" y1="118" x2="123" y2="118" stroke="#DDD0B5" stroke-width="0.8" opacity="0.4"/>
      <line x1="116" y1="126" x2="123" y2="126" stroke="#DDD0B5" stroke-width="0.8" opacity="0.3"/>
      <line x1="116" y1="134" x2="123" y2="134" stroke="#DDD0B5" stroke-width="0.8" opacity="0.3"/>
      <!-- Front cover -->
      <rect x="52" y="58" width="66" height="90" rx="5" fill="#C0633A"/>
      <!-- Cover border inset -->
      <rect x="58" y="65" width="54" height="76" rx="3"
            fill="none" stroke="#E8845A" stroke-width="1.5" opacity="0.55"/>
      <!-- Cover title band -->
      <rect x="63" y="78" width="44" height="7" rx="2" fill="#E8845A" opacity="0.45"/>
      <!-- Cover author lines -->
      <rect x="67" y="91" width="36" height="4" rx="2" fill="#E8845A" opacity="0.30"/>
      <rect x="69" y="100" width="32" height="3" rx="1" fill="#E8845A" opacity="0.22"/>
      <!-- Small decorative star on cover -->
      <circle cx="85" cy="118" r="4" fill="#F5C88A" opacity="0.55"/>
      <polygon points="85,113 86.2,116.6 90,116.6 87.2,118.8 88.4,122.4 85,120.2 81.6,122.4 82.8,118.8 80,116.6 83.8,116.6"
               fill="#F5C88A" opacity="0.75" transform="scale(0.65) translate(46,63)"/>
      <!-- Spine -->
      <rect x="52" y="58" width="8" height="90" rx="4" fill="#7A3210"/>
      <!-- Spine highlight -->
      <rect x="54" y="62" width="2" height="82" rx="1" fill="#D06040" opacity="0.40"/>
    </g><!-- /.book__closed -->

    <!-- ════════════════════════════════════════════════════════════
         OPEN BOOK  (focus states)
         ════════════════════════════════════════════════════════════ -->
    <g class="book__open">

      <!-- Drop shadow -->
      <ellipse cx="90" cy="139" rx="56" ry="5" fill="rgba(0,0,0,0.10)"/>

      <!-- Left page (read pages — CSS page-turn pivots right center) -->
      <g class="book__page-left">
        <!-- Back cover remnant on far left edge -->
        <rect x="30" y="55" width="6" height="80" rx="3" fill="#C0633A"/>
        <!-- Page body -->
        <rect x="30" y="55" width="58" height="80" rx="3" fill="#FDFAF4"/>
        <!-- Text lines -->
        <line x1="40" y1="68" x2="82" y2="68" stroke="#C8B49A" stroke-width="1.2" stroke-linecap="round" opacity="0.75"/>
        <line x1="40" y1="75" x2="82" y2="75" stroke="#C8B49A" stroke-width="1.2" stroke-linecap="round" opacity="0.70"/>
        <line x1="40" y1="82" x2="82" y2="82" stroke="#C8B49A" stroke-width="1.2" stroke-linecap="round" opacity="0.70"/>
        <line x1="40" y1="89" x2="82" y2="89" stroke="#C8B49A" stroke-width="1.2" stroke-linecap="round" opacity="0.65"/>
        <line x1="40" y1="96" x2="82" y2="96" stroke="#C8B49A" stroke-width="1.2" stroke-linecap="round" opacity="0.60"/>
        <line x1="40" y1="103" x2="78" y2="103" stroke="#C8B49A" stroke-width="1.2" stroke-linecap="round" opacity="0.55"/>
        <line x1="40" y1="110" x2="80" y2="110" stroke="#C8B49A" stroke-width="1.2" stroke-linecap="round" opacity="0.50"/>
        <line x1="40" y1="117" x2="74" y2="117" stroke="#C8B49A" stroke-width="1.2" stroke-linecap="round" opacity="0.45"/>
        <!-- Small decorative paragraph mark -->
        <circle cx="42" cy="90" r="1.5" fill="#C8B49A" opacity="0.40"/>
      </g><!-- /.book__page-left -->

      <!-- Right page (unread pages — static) -->
      <g class="book__page-right">
        <!-- Page body -->
        <rect x="92" y="55" width="58" height="80" rx="3" fill="#FDF6E8"/>
        <!-- Text lines -->
        <line x1="100" y1="68" x2="142" y2="68" stroke="#C8B49A" stroke-width="1.2" stroke-linecap="round" opacity="0.75"/>
        <line x1="100" y1="75" x2="142" y2="75" stroke="#C8B49A" stroke-width="1.2" stroke-linecap="round" opacity="0.70"/>
        <line x1="100" y1="82" x2="142" y2="82" stroke="#C8B49A" stroke-width="1.2" stroke-linecap="round" opacity="0.70"/>
        <line x1="100" y1="89" x2="142" y2="89" stroke="#C8B49A" stroke-width="1.2" stroke-linecap="round" opacity="0.65"/>
        <line x1="100" y1="96" x2="142" y2="96" stroke="#C8B49A" stroke-width="1.2" stroke-linecap="round" opacity="0.60"/>
        <line x1="100" y1="103" x2="138" y2="103" stroke="#C8B49A" stroke-width="1.2" stroke-linecap="round" opacity="0.55"/>
        <line x1="100" y1="110" x2="140" y2="110" stroke="#C8B49A" stroke-width="1.2" stroke-linecap="round" opacity="0.50"/>
        <line x1="100" y1="117" x2="134" y2="117" stroke="#C8B49A" stroke-width="1.2" stroke-linecap="round" opacity="0.45"/>
      </g><!-- /.book__page-right -->

      <!-- Spine (center crease) -->
      <g class="book__spine">
        <rect x="87" y="55" width="6" height="80" rx="2" fill="#A0522D"/>
        <rect x="88" y="57" width="1.5" height="76" rx="0.5" fill="#D06040" opacity="0.40"/>
      </g>

    </g><!-- /.book__open -->

    <!-- Right page-edge stack — JS updates width and x every tick
         Right edge is anchored at x=156; as ratio→1: width 6→1, x=150→155 -->
    <rect id="book__page-edge" x="150" y="57" width="6" height="76"
          rx="2" fill="#EDE8DF"/>

    <!-- Bookmark ribbon + V-notch — JS updates transform="translate(dx,0)"
         dx range: 0→39 (moves bookmark from x=103 to x=142) -->
    <g id="book__bookmark" transform="translate(0,0)">
      <rect x="103" y="55" width="7" height="30" rx="1" fill="#E84040"/>
      <!-- V-notch at bottom of ribbon -->
      <polygon points="103,85 106.5,81 110,85" fill="#FDF6E8"/>
      <!-- Ribbon shine -->
      <rect x="104" y="57" width="2" height="22" rx="1" fill="#FF7070" opacity="0.45"/>
    </g>

    <!-- ════════════════════════════════════════════════════════════
         ZZZ  (focus-sleeping state)
         ════════════════════════════════════════════════════════════ -->
    <g class="book__zzz">
      <text class="zzz-small"  x="148" y="50"
            font-size="10" font-family="Nunito, sans-serif" font-weight="800"
            fill="#A08060" opacity="0.75" text-anchor="middle">z</text>
      <text class="zzz-medium" x="156" y="39"
            font-size="13" font-family="Nunito, sans-serif" font-weight="800"
            fill="#A08060" opacity="0.75" text-anchor="middle">z</text>
      <text class="zzz-large"  x="163" y="27"
            font-size="16" font-family="Nunito, sans-serif" font-weight="800"
            fill="#A08060" opacity="0.75" text-anchor="middle">Z</text>
    </g>

  </g><!-- /.book__root -->

  <!-- ════════════════════════════════════════════════════════════
       SHELF SCENE  (break-active / break-done)
       Lives OUTSIDE book__root so the fly-out animation doesn't take it.
       CSS hides this by default; book--break-active shows it.
       ════════════════════════════════════════════════════════════ -->
  <g id="book__shelf" class="book__shelf">

    <!-- Shelf bracket left -->
    <rect x="24" y="110" width="5" height="28" rx="2" fill="#6B4226"/>
    <!-- Shelf bracket right -->
    <rect x="151" y="110" width="5" height="28" rx="2" fill="#6B4226"/>
    <!-- Shelf plank -->
    <rect x="20" y="127" width="140" height="11" rx="3" fill="#8B5E3C"/>
    <!-- Plank top highlight -->
    <rect x="20" y="127" width="140" height="3" rx="2" fill="#A87050" opacity="0.50"/>
    <!-- Plank shadow -->
    <rect x="22" y="137" width="138" height="5" rx="2" fill="#5A3820" opacity="0.22"/>

    <!-- Session book 1 — blue (always shown when shelf is visible) -->
    <g class="shelf-book shelf-book--1">
      <rect x="32" y="97" width="18" height="30" rx="2" fill="#4A8FCB"/>
      <rect x="32" y="97" width="4"  height="30" rx="1" fill="#336AA0"/>
      <rect x="36" y="102" width="11" height="3" rx="1" fill="#7BBDE8" opacity="0.65"/>
      <rect x="36" y="108" width="9"  height="2" rx="1" fill="#7BBDE8" opacity="0.45"/>
    </g>

    <!-- Session book 2 — orange (hidden until sessionNumber ≥ 2) -->
    <g class="shelf-book shelf-book--2">
      <rect x="54" y="100" width="20" height="27" rx="2" fill="#D96B30"/>
      <rect x="54" y="100" width="5"  height="27" rx="1" fill="#B0501E"/>
      <rect x="59" y="105" width="12" height="3" rx="1" fill="#F5A070" opacity="0.65"/>
      <rect x="59" y="111" width="10" height="2" rx="1" fill="#F5A070" opacity="0.45"/>
    </g>

    <!-- Session book 3 — green -->
    <g class="shelf-book shelf-book--3">
      <rect x="78" y="98" width="19" height="29" rx="2" fill="#52A658"/>
      <rect x="78" y="98" width="4"  height="29" rx="1" fill="#3A8040"/>
      <rect x="82" y="103" width="11" height="3" rx="1" fill="#90D494" opacity="0.65"/>
      <rect x="82" y="109" width="9"  height="2" rx="1" fill="#90D494" opacity="0.45"/>
    </g>

    <!-- Session book 4 — purple -->
    <g class="shelf-book shelf-book--4">
      <rect x="101" y="101" width="18" height="26" rx="2" fill="#9244B8"/>
      <rect x="101" y="101" width="4"  height="26" rx="1" fill="#6E2A90"/>
      <rect x="105" y="106" width="10" height="3" rx="1" fill="#CC88E0" opacity="0.65"/>
      <rect x="105" y="112" width="8"  height="2" rx="1" fill="#CC88E0" opacity="0.45"/>
    </g>

    <!-- Sparkle star above shelf center -->
    <g class="book__sparkle">
      <!-- Central glow -->
      <circle cx="90" cy="82" r="4" fill="#F5C840" opacity="0.85"/>
      <!-- Cardinal rays -->
      <line x1="90" y1="74" x2="90" y2="70" stroke="#F5C840" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="90" y1="90" x2="90" y2="94" stroke="#F5C840" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="82"  y1="82" x2="78"  y2="82" stroke="#F5C840" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="98"  y1="82" x2="102" y2="82" stroke="#F5C840" stroke-width="1.8" stroke-linecap="round"/>
      <!-- Diagonal rays -->
      <line x1="85" y1="77" x2="82" y2="74" stroke="#F5C840" stroke-width="1.2" stroke-linecap="round" opacity="0.70"/>
      <line x1="95" y1="77" x2="98" y2="74" stroke="#F5C840" stroke-width="1.2" stroke-linecap="round" opacity="0.70"/>
      <line x1="85" y1="87" x2="82" y2="90" stroke="#F5C840" stroke-width="1.2" stroke-linecap="round" opacity="0.70"/>
      <line x1="95" y1="87" x2="98" y2="90" stroke="#F5C840" stroke-width="1.2" stroke-linecap="round" opacity="0.70"/>
    </g>

  </g><!-- /#book__shelf -->

</svg>
