<svg class="book" viewBox="0 0 180 180"
     xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <!--
    PomoFomo — Book character "Page" (oblique view)

    The book is viewed from slightly above and to the right, like looking
    at an open book lying on a desk. The spine is the center ridge.

    Progress is shown by the page STACKS:
      Left stack  (#book__stack-left)  — read pages, grows   leftward  (thin→thick)
      Right stack (#book__stack-right) — unread pages, shrinks inward  (thick→thin)
    Both stacks are JS-driven via setProgress(ratio).

    A page-flip element (.book__page-turn) animates from the right stack
    over the spine and onto the left stack periodically (CSS only).

    Groups:
      book__root        body-level animations (bob, fly-out)
        book__closed    closed-book cover (idle state)
        book__open      two open-page faces + spine + page-turn + lines
        book__zzz       floating ZZZ (focus-sleeping)
      #book__stack-left  JS-driven left stack rect  (inside book__root)
      #book__stack-right JS-driven right stack rect (inside book__root)
      #book__shelf       OUTSIDE book__root — doesn't fly away
  -->

  <defs>
    <!-- Striped gradient: horizontal bands suggest individual page edges -->
    <linearGradient id="pageStackGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#F2EDE0"/>
      <stop offset="9%"   stop-color="#E6DFCE"/>
      <stop offset="10%"  stop-color="#F2EDE0"/>
      <stop offset="19%"  stop-color="#E6DFCE"/>
      <stop offset="20%"  stop-color="#F2EDE0"/>
      <stop offset="29%"  stop-color="#E6DFCE"/>
      <stop offset="30%"  stop-color="#F2EDE0"/>
      <stop offset="39%"  stop-color="#E6DFCE"/>
      <stop offset="40%"  stop-color="#F2EDE0"/>
      <stop offset="49%"  stop-color="#E6DFCE"/>
      <stop offset="50%"  stop-color="#F2EDE0"/>
      <stop offset="59%"  stop-color="#E6DFCE"/>
      <stop offset="60%"  stop-color="#F2EDE0"/>
      <stop offset="69%"  stop-color="#E6DFCE"/>
      <stop offset="70%"  stop-color="#F2EDE0"/>
      <stop offset="79%"  stop-color="#E6DFCE"/>
      <stop offset="80%"  stop-color="#F2EDE0"/>
      <stop offset="89%"  stop-color="#E6DFCE"/>
      <stop offset="90%"  stop-color="#F2EDE0"/>
      <stop offset="100%" stop-color="#E6DFCE"/>
    </linearGradient>
  </defs>

  <g class="book__root">

    <!-- ════════════════════════════════════════════════════════════
         CLOSED BOOK  (idle)
         Oblique view: cover tilts slightly, spine and page-edge visible
         ════════════════════════════════════════════════════════════ -->
    <g class="book__closed">
      <ellipse cx="90" cy="150" rx="52" ry="6" fill="rgba(0,0,0,0.09)"/>

      <!-- Page block — right edge (all pages stacked, unread + read) -->
      <polygon points="158,60  165,64  165,148  158,148" fill="url(#pageStackGrad)"/>
      <!-- Page block top face (slight 3D) -->
      <polygon points="30,60  158,60  165,64  36,64" fill="#EDE8DC"/>

      <!-- Back cover (offset for depth) -->
      <polygon points="30,62  158,62  158,148  30,148" fill="#7A2E08"/>
      <!-- Front cover -->
      <polygon points="22,58  158,58  158,148  22,148" fill="#C0633A"/>
      <!-- Cover inset border -->
      <polygon points="30,66  150,66  150,140  30,140"
               fill="none" stroke="#E8845A" stroke-width="1.5" opacity="0.50"/>
      <!-- Cover title lines -->
      <rect x="38" y="78" width="104" height="7" rx="3" fill="#E8845A" opacity="0.40"/>
      <rect x="44" y="90" width="92"  height="5" rx="2" fill="#E8845A" opacity="0.26"/>
      <rect x="50" y="100" width="80" height="4" rx="2" fill="#E8845A" opacity="0.18"/>

      <!-- Spine (left edge) -->
      <polygon points="22,58  32,58  32,148  22,148" fill="#6E2808"/>
      <!-- Spine top (3D ledge) -->
      <polygon points="22,58  32,58  36,54  26,54" fill="#8B3810"/>
      <!-- Spine highlight line -->
      <line x1="25" y1="60" x2="25" y2="146" stroke="#B05030" stroke-width="1.8" opacity="0.35"/>
    </g><!-- /.book__closed -->

    <!-- ════════════════════════════════════════════════════════════
         OPEN BOOK  (focus states)
         Oblique V-shape: spine is the hinge, pages fan out to each side.
         Viewed from slightly above — both page faces visible.
         ════════════════════════════════════════════════════════════ -->
    <g class="book__open">
      <ellipse cx="90" cy="150" rx="62" ry="6" fill="rgba(0,0,0,0.09)"/>

      <!-- ── Left page face (read side) ───────────────────────── -->
      <!-- Polygon leans left; top-left is lower than top-right (spine is raised) -->
      <polygon class="book__page-left"
               points="22,68  87,55  87,140  22,148"
               fill="#FDFAF4"/>
      <!-- Subtle cover remnant on far-left edge -->
      <polygon points="22,68  29,68  29,148  22,148" fill="#B05030" opacity="0.30"/>
      <!-- Text lines: parallel to the parallelogram's top/bottom edges -->
      <line x1="32" y1="73" x2="84" y2="62" stroke="#C8B49A" stroke-width="1.1" stroke-linecap="round" opacity="0.68"/>
      <line x1="32" y1="81" x2="84" y2="70" stroke="#C8B49A" stroke-width="1.1" stroke-linecap="round" opacity="0.64"/>
      <line x1="32" y1="89" x2="84" y2="78" stroke="#C8B49A" stroke-width="1.1" stroke-linecap="round" opacity="0.62"/>
      <line x1="32" y1="97" x2="84" y2="86" stroke="#C8B49A" stroke-width="1.1" stroke-linecap="round" opacity="0.58"/>
      <line x1="32" y1="105" x2="84" y2="94" stroke="#C8B49A" stroke-width="1.1" stroke-linecap="round" opacity="0.54"/>
      <line x1="32" y1="113" x2="84" y2="102" stroke="#C8B49A" stroke-width="1.1" stroke-linecap="round" opacity="0.50"/>
      <line x1="32" y1="121" x2="84" y2="110" stroke="#C8B49A" stroke-width="1.1" stroke-linecap="round" opacity="0.46"/>
      <line x1="32" y1="129" x2="84" y2="118" stroke="#C8B49A" stroke-width="1.1" stroke-linecap="round" opacity="0.40"/>

      <!-- ── Right page face (unread side) ─────────────────────── -->
      <polygon class="book__page-right"
               points="93,55  158,68  158,148  93,140"
               fill="#FDF6E8"/>
      <!-- Text lines: parallel to the parallelogram's top/bottom edges -->
      <line x1="96" y1="62" x2="152" y2="73" stroke="#C8B49A" stroke-width="1.1" stroke-linecap="round" opacity="0.68"/>
      <line x1="96" y1="70" x2="152" y2="81" stroke="#C8B49A" stroke-width="1.1" stroke-linecap="round" opacity="0.64"/>
      <line x1="96" y1="78" x2="152" y2="89" stroke="#C8B49A" stroke-width="1.1" stroke-linecap="round" opacity="0.62"/>
      <line x1="96" y1="86" x2="152" y2="97" stroke="#C8B49A" stroke-width="1.1" stroke-linecap="round" opacity="0.58"/>
      <line x1="96" y1="94" x2="152" y2="105" stroke="#C8B49A" stroke-width="1.1" stroke-linecap="round" opacity="0.54"/>
      <line x1="96" y1="102" x2="152" y2="113" stroke="#C8B49A" stroke-width="1.1" stroke-linecap="round" opacity="0.50"/>
      <line x1="96" y1="110" x2="152" y2="121" stroke="#C8B49A" stroke-width="1.1" stroke-linecap="round" opacity="0.46"/>
      <line x1="96" y1="118" x2="152" y2="129" stroke="#C8B49A" stroke-width="1.1" stroke-linecap="round" opacity="0.40"/>

      <!-- ── Spine / binding ────────────────────────────────────── -->
      <polygon class="book__spine"
               points="87,55  93,55  93,140  87,140"
               fill="#944020"/>
      <!-- Spine top ridge (3D crease) -->
      <polygon points="84,52  96,52  93,55  87,55" fill="#7A3015"/>
      <!-- Spine center highlight -->
      <line x1="90" y1="55" x2="90" y2="139" stroke="#C06040" stroke-width="1.5" opacity="0.35"/>

      <!-- ── Page-flip element (CSS-animated) ──────────────────── -->
      <!-- A page that lifts from the right pile, arcs over the spine,
           and lands on the left pile. Starts transparent; CSS fades it in,
           animates scaleX 1→0→-1, then fades out.
           transform-origin: left center (= the spine, x≈93) via fill-box. -->
      <polygon class="book__page-turn"
               points="93,55  158,68  158,148  93,140"
               fill="#FDF2DC"/>
    </g><!-- /.book__open -->

    <!-- ── Page stacks — JS-driven widths via setProgress() ──────────────
         Left stack (read):   right edge anchored at x=22, grows leftward
         Right stack (unread): left edge anchored at x=158, shrinks inward
         Both hidden by default; CSS shows them only during focus states.
         ──────────────────────────────────────────────────────────────── -->
    <rect id="book__stack-left"  x="20" y="68" width="2" height="80"
          rx="1" fill="url(#pageStackGrad)"/>
    <rect id="book__stack-right" x="158" y="68" width="20" height="80"
          rx="1" fill="url(#pageStackGrad)"/>

    <!-- ════════════════════════════════════════════════════════════
         ZZZ  (focus-sleeping)
         ════════════════════════════════════════════════════════════ -->
    <g class="book__zzz">
      <text class="zzz-small"  x="148" y="50"
            font-size="10" font-family="Nunito, sans-serif" font-weight="800"
            fill="#A08060" opacity="0.75" text-anchor="middle">z</text>
      <text class="zzz-medium" x="156" y="39"
            font-size="13" font-family="Nunito, sans-serif" font-weight="800"
            fill="#A08060" opacity="0.75" text-anchor="middle">z</text>
      <text class="zzz-large"  x="163" y="27"
            font-size="16" font-family="Nunito, sans-serif" font-weight="800"
            fill="#A08060" opacity="0.75" text-anchor="middle">Z</text>
    </g>

  </g><!-- /.book__root -->

  <!-- ════════════════════════════════════════════════════════════
       SHELF SCENE  (break-active / break-done)
       Outside book__root so the fly-out animation doesn't take it.
       ════════════════════════════════════════════════════════════ -->
  <g id="book__shelf" class="book__shelf">

    <!-- Shelf wall brackets -->
    <rect x="24" y="108" width="5" height="30" rx="2" fill="#6B4226"/>
    <rect x="151" y="108" width="5" height="30" rx="2" fill="#6B4226"/>

    <!-- Shelf plank (oblique for depth) -->
    <polygon points="20,127  160,127  163,133  17,133" fill="#8B5E3C"/>
    <polygon points="20,127  163,133  163,136  20,136" fill="#6B4020" opacity="0.45"/>
    <!-- Plank top highlight -->
    <rect x="20" y="127" width="140" height="2" rx="1" fill="#A87050" opacity="0.55"/>

    <!-- Session book 1 — blue (always visible on shelf) -->
    <g class="shelf-book shelf-book--1">
      <rect x="32" y="97" width="18" height="30" rx="2" fill="#4A8FCB"/>
      <rect x="32" y="97" width="4" height="30" rx="1" fill="#336AA0"/>
      <rect x="36" y="102" width="11" height="3" rx="1" fill="#7BBDE8" opacity="0.65"/>
      <rect x="36" y="108" width="9"  height="2" rx="1" fill="#7BBDE8" opacity="0.45"/>
    </g>

    <!-- Session book 2 — orange (shown when sessionNumber ≥ 2) -->
    <g class="shelf-book shelf-book--2">
      <rect x="54" y="100" width="20" height="27" rx="2" fill="#D96B30"/>
      <rect x="54" y="100" width="5"  height="27" rx="1" fill="#B0501E"/>
      <rect x="59" y="105" width="12" height="3" rx="1" fill="#F5A070" opacity="0.65"/>
      <rect x="59" y="111" width="10" height="2" rx="1" fill="#F5A070" opacity="0.45"/>
    </g>

    <!-- Session book 3 — green -->
    <g class="shelf-book shelf-book--3">
      <rect x="78" y="98" width="19" height="29" rx="2" fill="#52A658"/>
      <rect x="78" y="98" width="4"  height="29" rx="1" fill="#3A8040"/>
      <rect x="82" y="103" width="11" height="3" rx="1" fill="#90D494" opacity="0.65"/>
      <rect x="82" y="109" width="9"  height="2" rx="1" fill="#90D494" opacity="0.45"/>
    </g>

    <!-- Session book 4 — purple -->
    <g class="shelf-book shelf-book--4">
      <rect x="101" y="101" width="18" height="26" rx="2" fill="#9244B8"/>
      <rect x="101" y="101" width="4"  height="26" rx="1" fill="#6E2A90"/>
      <rect x="105" y="106" width="10" height="3" rx="1" fill="#CC88E0" opacity="0.65"/>
      <rect x="105" y="112" width="8"  height="2" rx="1" fill="#CC88E0" opacity="0.45"/>
    </g>

    <!-- Sparkle star above shelf -->
    <g class="book__sparkle">
      <circle cx="90" cy="82" r="4" fill="#F5C840" opacity="0.85"/>
      <line x1="90" y1="74" x2="90" y2="70" stroke="#F5C840" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="90" y1="90" x2="90" y2="94" stroke="#F5C840" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="82"  y1="82" x2="78"  y2="82" stroke="#F5C840" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="98"  y1="82" x2="102" y2="82" stroke="#F5C840" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="85" y1="77" x2="82" y2="74" stroke="#F5C840" stroke-width="1.2" stroke-linecap="round" opacity="0.70"/>
      <line x1="95" y1="77" x2="98" y2="74" stroke="#F5C840" stroke-width="1.2" stroke-linecap="round" opacity="0.70"/>
      <line x1="85" y1="87" x2="82" y2="90" stroke="#F5C840" stroke-width="1.2" stroke-linecap="round" opacity="0.70"/>
      <line x1="95" y1="87" x2="98" y2="90" stroke="#F5C840" stroke-width="1.2" stroke-linecap="round" opacity="0.70"/>
    </g>

  </g><!-- /#book__shelf -->

</svg>
