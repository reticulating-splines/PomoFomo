<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PomoFomo</title>
  <link rel="stylesheet" href="popup.css">
</head>

<!--
  data-view="status"   → shows the timer status panel
  data-view="settings" → shows the settings panel (slides in)
-->
<body data-view="status">

  <!-- ── Header (persistent across views) ───────────────────────────────── -->
  <header class="popup-header">
    <span class="brand">🐉 PomoFomo</span>

    <!-- Mini timer badge: visible when settings view is open so you don't lose context -->
    <span class="mini-badge" id="miniBadge" aria-label="Current timer status"></span>

    <button class="icon-btn" id="btnGear" aria-label="Toggle settings" title="Settings">
      <svg viewBox="0 0 20 20" width="18" height="18" fill="none"
           xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path fill-rule="evenodd" clip-rule="evenodd"
          d="M10 12.5a2.5 2.5 0 100-5 2.5 2.5 0 000 5z"
          fill="currentColor"/>
        <path fill-rule="evenodd" clip-rule="evenodd"
          d="M8.2 2.1a1 1 0 011.8 0l.5 1.1a6 6 0 011.5.6l1.1-.4a1 1 0 011.2.5l.8 1.4a1 1 0 01-.3 1.3l-.9.7v1.4l.9.7a1 1 0 01.3 1.3l-.8 1.4a1 1 0 01-1.2.5l-1.1-.4a6 6 0 01-1.5.6l-.5 1.1a1 1 0 01-1.8 0l-.5-1.1A6 6 0 016.2 12l-1.1.4a1 1 0 01-1.2-.5L3 10.4a1 1 0 01.3-1.3l.9-.7V7l-.9-.7A1 1 0 013 5l.8-1.4a1 1 0 011.2-.5l1.1.4a6 6 0 011.5-.6l.5-1.1z"
          fill="currentColor" opacity="0.3"/>
      </svg>
    </button>
  </header>

  <!-- ── View: Status ────────────────────────────────────────────────────── -->
  <section class="view view-status" id="viewStatus" aria-label="Timer status">

    <div class="status-card">
      <!-- Mini dragon + phase info -->
      <div class="status-phase-row">
        <div class="status-icon" id="statusIcon" aria-hidden="true">🐉</div>
        <div class="status-info">
          <div class="status-phase" id="statusPhase">Ready</div>
          <div class="status-time"  id="statusTime">20:00</div>
        </div>
      </div>

      <!-- Session dots (mini version) -->
      <div class="session-dots-mini" id="popupDots" role="img" aria-label="Session progress"></div>
    </div>

    <!-- Go to timer tab -->
    <button class="btn btn-primary" id="btnGoToTimer">
      Open Timer Tab ↗
    </button>

    <!-- Quick start: shown only when timer is idle -->
    <button class="btn btn-ghost" id="btnQuickStart" hidden>
      Start Focus
    </button>

    <!-- Stop: shown when timer is running — subtle parent control -->
    <button class="btn btn-stop-popup" id="btnStop" hidden>
      Stop timer
    </button>

  </section>

  <!-- ── View: Settings ──────────────────────────────────────────────────── -->
  <section class="view view-settings" id="viewSettings" aria-label="Settings">

    <form id="settingsForm" novalidate>

      <div class="field">
        <label for="sFocusMin">Focus time</label>
        <div class="slider-row">
          <input type="range" id="sFocusMin" min="5" max="60" step="5"
                 aria-label="Focus time in minutes">
          <span class="slider-val" id="sFocusVal">20 min</span>
        </div>
      </div>

      <div class="field">
        <label for="sShortMin">Short break</label>
        <div class="slider-row">
          <input type="range" id="sShortMin" min="1" max="15" step="1"
                 aria-label="Short break time in minutes">
          <span class="slider-val" id="sShortVal">5 min</span>
        </div>
      </div>

      <div class="field">
        <label for="sLongMin">Long break</label>
        <div class="slider-row">
          <input type="range" id="sLongMin" min="5" max="30" step="5"
                 aria-label="Long break time in minutes">
          <span class="slider-val" id="sLongVal">15 min</span>
        </div>
      </div>

      <div class="field">
        <label for="sSessions">Sessions before long break</label>
        <div class="stepper-row">
          <input type="range" id="sSessions" min="2" max="6" step="1"
                 aria-label="Number of sessions before long break">
          <span class="slider-val" id="sSessionsVal">3</span>
        </div>
      </div>

      <div class="divider"></div>

      <label class="toggle-label" for="sSound">
        <span>Sounds</span>
        <div class="toggle-track">
          <input type="checkbox" id="sSound" role="switch" aria-label="Enable sounds">
          <div class="toggle-thumb"></div>
        </div>
      </label>

      <label class="toggle-label" for="sPersist">
        <span>Resume timer after relaunch</span>
        <div class="toggle-track">
          <input type="checkbox" id="sPersist" role="switch"
                 aria-label="Resume timer after browser relaunch">
          <div class="toggle-thumb"></div>
        </div>
      </label>

    </form>

  </section>

  <script type="module" src="popup.js"></script>
</body>
</html>
